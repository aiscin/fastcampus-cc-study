name: 반도체 뉴스레터 자동 발행

# 평일(월~금) 오전 7:30 KST = 전날 22:30 UTC (KST 평일 = UTC 일~목 = 0-4)
on:
  schedule:
    - cron: "30 22 * * 0-4"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행(테스트)

permissions:
  contents: write          # 뉴스레터 커밋·푸시용

concurrency:
  group: newsletter
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install anthropic -r .claude/skills/naver-news/requirements.txt

      - name: 뉴스 수집 + 뉴스레터 생성
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 비용 절감 원하면 아래 주석 해제 (기본 claude-opus-4-8)
          # ANTHROPIC_MODEL: claude-sonnet-4-6
        run: |
          python3 .claude/skills/naver-news/scripts/fetch_news.py --sort date > news.json
          python3 .claude/skills/naver-news/scripts/generate_newsletter.py news.json | tee result.txt

      - name: 커밋 + 푸시 (변경 있을 때만)
        run: |
          if git diff --quiet -- "50-my-work/Part06-스킬만들기/실습27-검색API스킬/newsletter/"; then
            echo "변경 없음 — 휴장일이거나 수집 실패. 커밋 건너뜀."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "50-my-work/Part06-스킬만들기/실습27-검색API스킬/newsletter/"
          git commit -m "newsletter: $(TZ=Asia/Seoul date +%Y-%m-%d) 반도체"
          git push
